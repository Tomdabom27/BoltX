name: Test BoltX on macOS

on:
  push:
  pull_request:

jobs:
  test-macos:
    strategy:
      matrix:
        os: [macos-latest]  # GitHub handles Intel/Apple Silicon internally

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Show system info
        run: |
          uname -a
          uname -m

      - name: Run BoltX installer
        run: |
          curl -sSL https://raw.githubusercontent.com/Tomdabom27/BoltX/main/scripts/install.sh | bash

      - name: Verify installation
        run: |
          which boltx
          boltx search hello